<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoInsight - Write a review</title>
  <link rel="stylesheet" href="../CSS/review.css">
</head>

<body>

  <div id="header"></div>
  <div class="review-page-header">
    <a href="../HTML/index.html#home">
      <p> &lt </p>
      <p>Back</p>
    </a>
    <h2>Write a Review</h2>
    <p>Share your car ownership experience with the community</p>
  </div>

  <div class="form-container">
    <form action="" class="review-form">

      <div>
        <label class="label-element" for="select-car-model">SELECT YOUR CAR <span
            class="superscript-element">*</span></label> <br>
        <select class="input-element" name="Car" id="select-car-model" required>
          <option value="" hidden selected>Choose a Car...</option>
          <option value="Porsche 911 (2020)">Porsche 911 (2020)</option>
          <option value="RR Phantom (2020)">RR Phantom (2020)</option>
          <option value="Mercedes G-Wagon (2022)">Mercedes G-Wagon (2022)</option>
          <option value="Audi R8 (2024)">Audi R8 (2024)</option>
          <option value="Bentley Flying Spur (2020)">Bentley Flying Spur (2020)</option>
          <option value="Mercedes GT (2021)">Mercedes GT (2021)</option>
          <option value="Land Rover Defender (2024)">Land Rover Defender (2024)</option>
          <option value="BMW M5 (2025)">BMW M5 (2025)</option>
        </select>
      </div>

      <div>
        <label class="label-element" for="review-title">REVIEW TITLE <span class="superscript-element">*</span></label>
        <br>
        <input class="input-element" type="text" name="Review Title" id="review-title"
          placeholder="e.g., Best family car I have owned" required>
      </div>

      <div class="review-textarea-description">
        <label class="label-element" for="review-description">YOUR REVIEW <span
            class="superscript-element">*</span></label> <br>
        <textarea class="input-element" name="Review Description" id="review-description"
          placeholder="Share your experience with this car. What do you like? What could be bette? How's the performance, comfort, and reliability?"
          rows="10" cols="80" minlength="100" required></textarea>
        <p>Minimum 100 characters (0/100)</p>
      </div>

      <div class="ownership-and-maintenance">
        <div>
          <label class="label-element" for="ownership-duration">OWNERSHIP DURATION <span
              class="superscript-element">*</span></label> <br>
          <select class="input-element" name="Duration" id="ownership-duration" required>
            <option value="" hidden selected>Select duration...</option>
            <option value="">Less than 6 months</option>
            <option value="">6 months - 1 year</option>
            <option value="">1-2 years</option>
            <option value="">2-3 years</option>
            <option value="">3-5 years</option>
            <option value="">More than 5 years</option>
          </select>
        </div>

        <div>
          <label class="label-element" for="maintenance-cost">Average Annual Maintenance Cost <span
              class="superscript-element">*</span></label> <br>
          <select class="input-element" name="Duration" id="maintenance-cost" required>
            <option value="" hidden selected>Select cost range...</option>
            <option value="">Under ₹5,000</option>
            <option value="">₹5,000 - ₹10,000</option>
            <option value="">₹10,000 - ₹15,000</option>
            <option value="">₹15,000 - ₹20,000</option>
            <option value="">Above ₹20,000</option>
          </select>
        </div>
      </div>

      <div class="recommend-btn-container">
        <p class="label-element">Would you recommend this car to others? <span>*</span></p>
        <div>
          <input id="yes" type="radio" name="choice" class="recommend-yes" checked>
          <label class="recommend-btn yes" for="yes">Yes</label>
          <input id="no" type="radio" name="choice" class="recommend-no">
          <label class="recommend-btn no" for="no">No</label>
        </div>
      </div>

      <div class="submit-reset-btn">
        <button type="submit" class="submit-btn">Submit Review</button>
        <button type="reset" class="cancel-btn">Cancel</button>
      </div>

      <p class="t-and-c">By submitting, you agree to our community guidelines and terms of service</p>
    </form>
  </div>

  <script src="../JS/include.js"></script>
</body>

</html>
