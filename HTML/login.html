<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoInsight</title>
    <link rel="shortcut icon" href="../Asset/Icons/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body class="login-page-body">
    <header class="login-header">
        <div class="login-logo">
            <img src="../Asset/Icons/car-ico.svg" alt="AutoInsight Logo">
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to your AutoInsight account</p>
    </header>
    <div id="auth-error" style="display:none; max-width:420px; margin: 0 auto 1rem; background:rgba(220,53,69,0.12); border:1px solid rgb(220,53,69); color:#ff6b7a; padding:0.9rem 1.2rem; border-radius:10px; font-size:0.95rem;"></div>

    <main class="login-card">
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <img src="../Asset/Icons/profile.svg" alt="Email Icon" style="filter: invert(1);">
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <img src="../Asset/Icons/review.svg" alt="Lock Icon" style="filter: invert(1);">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="password-toggle">👁</span>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" id="login-submit-btn" class="sign-in-btn">Sign In</button>

        </form>
    </main>

    <footer class="login-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
    </footer>

    <script>
        // Password toggle
        const toggle = document.querySelector('.password-toggle');
        const passwordInput = document.querySelector('#password');
        toggle.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggle.textContent = type === 'password' ? '👁' : '🙈';
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorBox = document.getElementById('auth-error');
            const btn      = document.getElementById('login-submit-btn');
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            btn.textContent = 'Signing In...';
            btn.disabled = true;

            try {
                const res  = await fetch('../backend/auth/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    sessionStorage.setItem('ai_user', JSON.stringify(data.user));
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = '../index.html';
                    }
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError('Server error. Make sure XAMPP is running.');
            } finally {
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }

            function showError(msg) {
                errorBox.textContent = msg;
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
