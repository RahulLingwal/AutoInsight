<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoInsight</title>
    <link rel="shortcut icon" href="../Asset/Icons/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body class="login-page-body">
    <header class="login-header">
        <div class="login-logo">
            <img src="../Asset/Icons/car-ico.svg" alt="AutoInsight Logo">
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to your AutoInsight account</p>
    </header>

    <main class="login-card">
        <form class="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <img src="../Asset/Icons/profile.svg" alt="Email Icon" style="filter: invert(1);">
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <img src="../Asset/Icons/review.svg" alt="Lock Icon" style="filter: invert(1);">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="password-toggle">👁</span>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="sign-in-btn">Sign In</button>

            <div class="divider">or continue with</div>

            <div class="social-buttons">
                <button type="button" class="social-btn">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google">
                    Google
                </button>
                <button type="button" class="social-btn">
                    <img src="https://www.svgrepo.com/show/303114/facebook-3.svg" alt="Facebook">
                    Facebook
                </button>
            </div>
        </form>
    </main>

    <footer class="login-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
    </footer>

    <script>
        // Simple password toggle logic
        const toggle = document.querySelector('.password-toggle');
        const passwordInput = document.querySelector('#password');
        
        toggle.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggle.textContent = type === 'password' ? '👁' : '🙈';
        });
    </script>
</body>
</html>
