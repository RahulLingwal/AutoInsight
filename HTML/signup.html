<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoInsight Log In / Sign Up</title>
    <link rel="stylesheet" href="../CSS/style.css" />
    <link rel="stylesheet" href="../CSS/signup.css" />
  </head>

  <body>
    <div id="header"></div>

    <div class="logo-wrapper">
      <a class="logo" href="../index.html#home">
        <img src="../Asset/Icons/car-ico.svg" alt="Logo Image" />
      </a>
    </div>

    <div class="join-and-create-account">
      <h2>Join AutoInsight</h2>
      <p>Create your account to get started</p>
    </div>

    <main class="form-wrapper">
      <div id="auth-error" class="auth-error" style="display:none;"></div>
      <form id="signupForm" class="signupForm">
        <div>
          <label class="label-element" for="fullName">Full Name</label> <br />
          <input
            class="input-element"
            id="fullName"
            type="text"
            placeholder="Piyush Shah"
            required
          />
        </div>
        <div>
          <label class="label-element" for="email">Email Address</label> <br />
          <input
            class="input-element"
            id="email"
            type="text"
            placeholder="abc@email.com"
            required
          />
        </div>
        <div>
          <label class="label-element" for="number">Phone Number</label> <br />
          <input
            class="input-element"
            id="number"
            type="text"
            placeholder="+91-******2029"
            required
          />
        </div>
        <div>
          <label class="label-element" for="password">Password</label> <br />
          <input
            class="input-element"
            id="password"
            type="text"
            placeholder="Create a strong password"
            required
          />
        </div>
        <div>
          <label class="label-element" for="confirmPassword"
            >Confirm Password</label
          >
          <br />
          <input
            class="input-element"
            id="confirmPassword"
            type="text"
            placeholder="Confirm your password"
            required
          />
        </div>
        <div class="terms-and-conditions">
          <input id="rememberMe" type="checkbox" />
          <label for="rememberMe"
            >I agree to the <a href="">Terms Of Service</a> and
            <a href="">Privacy Policy</a></label
          >
        </div>
        <button type="submit" class="create-account-btn" id="signup-submit-btn">Create Account</button>

      </form>
      <p class="switch">
        Already have an account? <a href="login.html">Log In</a>
      </p>
    </main>

    <style>
      .auth-error { background: rgba(220,53,69,0.12); border: 1px solid rgb(220,53,69); color: #ff6b7a; padding: 0.9rem 1.2rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.95rem; }
      .auth-success { background: rgba(40,167,69,0.12); border: 1px solid #28a745; color: #5cb85c; padding: 0.9rem 1.2rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.95rem; }
    </style>

    <script>
      document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('auth-error');
        const btn = document.getElementById('signup-submit-btn');

        const name     = document.getElementById('fullName').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirm  = document.getElementById('confirmPassword').value.trim();
        const agreed   = document.getElementById('rememberMe').checked;

        // Client-side validation
        if (!agreed) { showError('Please accept the Terms of Service.'); return; }
        if (password !== confirm) { showError('Passwords do not match.'); return; }
        if (password.length < 6)  { showError('Password must be at least 6 characters.'); return; }

        btn.textContent = 'Creating Account...';
        btn.disabled = true;

        try {
          const res  = await fetch('../backend/auth/register.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
          });
          const data = await res.json();

          if (data.success) {
            sessionStorage.setItem('ai_user', JSON.stringify(data.user));
            window.location.href = '../index.html';
          } else {
            showError(data.message);
          }
        } catch (err) {
          showError('Server error. Make sure XAMPP is running.');
        } finally {
          btn.textContent = 'Create Account';
          btn.disabled = false;
        }

        function showError(msg) {
          errorBox.textContent = msg;
          errorBox.style.display = 'block';
          errorBox.className = 'auth-error';
        }
      });
    </script>
    <script src="../JS/include.js"></script>
  </body>
</html>
