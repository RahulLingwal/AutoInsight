<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoInsight - Car Review Platform</title>
    <link rel="stylesheet" href="../CSS/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navigation-bar-logo">
        <a class="AutoInsight" href="index.html">
          <div>
            <img class="icons" src="../Asset/Icons/car-ico.svg" alt="Logo" />
          </div>
          <div class="brand-text">
            <p>AutoInsight</p>
            <p>Car Reviews & Community</p>
          </div>
        </a>
      </div>

      <div class="navigation-bar">
        <ul class="navlist">
          <li class="navlist-items">
            <a href="index.html">
              <img class="icons" src="../Asset/Icons/home.svg" alt="Home" />
              Home
            </a>
          </li>
          <li class="navlist-items">
            <a href="../HTML/cars.html">
              <img class="icons" src="../Asset/Icons/car-ico.svg" alt="Cars" />
              Cars
            </a>
          </li>
          <li class="navlist-items">
            <a href="../HTML/tips.html">
              <img class="icons" src="../Asset/Icons/tips.svg" alt="Tips" />
              Tips&Problems
            </a>
          </li>
          <li class="navlist-items">
            <a href="../HTML/community.html">
              <img class="icons" src="../Asset/Icons/chat.svg" alt="Community" />
              Community
            </a>
          </li>
          <li class="navlist-items write-review-btn">
            <a href="../HTML/review.html">
              <img class="icons" src="../Asset/Icons/review.svg" alt="Review" />
              Write Review
            </a>
          </li>
        </ul>
      </div>

      <!-- Auth buttons -->
      <div class="navbarButtons" id="navbar-auth">
        <!-- Logged OUT -->
        <div id="nav-logged-out" style="display:flex; gap:12px;">
          <a href="../HTML/login.html" style="text-decoration:none;">
            <button class="logInButton">
              <img class="icons" src="../Asset/Icons/profile.svg" alt="Log In" />
              Log In
            </button>
          </a>
          <a href="../HTML/signup.html" style="text-decoration:none;">
            <button class="signUpButton">Sign Up</button>
          </a>
        </div>

        <!-- Logged IN -->
        <div id="nav-logged-in" style="display:none; position:relative; align-items:center;">
          <div class="profile-pill" id="profile-pill">
            <div class="pill-avatar">
              <img id="nav-avatar" src="../Asset/Images/person1.jpg" alt="User">
            </div>
            <span id="nav-user-name">User</span>
            <span class="chevron">&#9662;</span>
          </div>

          <!-- Dropdown Menu -->
          <div class="profile-dropdown" id="profile-dropdown">
            <div class="dropdown-header">
              <img id="dropdown-avatar" src="../Asset/Images/person1.jpg" alt="User">
              <div class="user-info">
                <p id="dropdown-name" class="name">User Name</p>
                <p id="dropdown-email" class="email">user@email.com</p>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <ul class="dropdown-links">
              <li>
                <a href="../HTML/profile.html" id="dropdown-profile-link">
                  <img src="../Asset/Icons/profile.svg" alt="Profile">
                  View Profile
                </a>
              </li>
              <li>
                <a href="../HTML/profile.html?tab=settings" id="dropdown-settings-link">
                  <img src="../Asset/Icons/tips.svg" alt="Settings">
                  Settings
                </a>
              </li>
              <li class="logout-li">
                <button id="nav-logout-btn">
                  <img src="../Asset/Icons/review.svg" alt="Logout" style="filter: invert(42%) sepia(93%) saturate(1352%) hue-rotate(311deg) brightness(100%) contrast(100%);">
                  Logout
                </button>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
